name: 'Submodule - Build'

on:
  workflow_call:
    inputs:
      version:
        required: true
        description: 'Version to build'
        type: string
      artifact-name:
        required: true
        description: 'Artifact name'
        type: string

jobs:
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout project sources'
        uses: actions/checkout@v6
