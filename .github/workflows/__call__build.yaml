# Reusable workflow: version optionally pinned, then sdist/wheel build + twine check via Makefile.

name: 'Submodule - Build'

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      artifact-name:
        description: 'Artifact name to upload'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout project sources'
        uses: actions/checkout@v6

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # Creates .venv and installs dev deps (build, twine, …) so Makefile targets work.
      - name: 'Install dependencies (make install-dev)'
        run: make install-dev

      - name: 'Show build information'
        run: |
          echo "Building package with version input: ${{ inputs.version }}"
          echo "Current pyproject.toml version:"
          grep "^version = " pyproject.toml

      - name: 'Update version in pyproject.toml'
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            sed -i "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" pyproject.toml
            echo "Updated version to ${{ inputs.version }} in pyproject.toml"
            grep "^version = " pyproject.toml
          fi

      - name: 'Build package (make build)'
        run: make build

      - name: 'Verify version in built package'
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "Verifying built artifacts exist for expected version ${{ inputs.version }}..."
            echo "Wheels:"
            find dist/ -maxdepth 1 -name '*.whl' -print || true
            echo "sdists:"
            find dist/ -maxdepth 1 -name '*.tar.gz' -print || true
          fi

      - name: 'Check distribution (make check-dist)'
        run: make check-dist

      - name: 'Upload build artifacts'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            dist/
            Makefile
            pyproject.toml
          retention-days: 30
