name: 'Submodule - Publish'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        description: 'Environment to publish to'
        type: string
      artifact-name:
        required: true
        description: 'Artifact name'
        type: string

jobs:
  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: 'Checkout project sources'
        uses: actions/checkout@v6
