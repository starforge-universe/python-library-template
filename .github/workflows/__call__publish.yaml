# Reusable workflow: checkout, download build artifact, venv, twine upload via Makefile.
# Expects artifact from __call__build (dist/, Makefile, pyproject.toml).

name: 'Submodule - Publish PyPI'

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to publish to'
        required: true
        type: string
        default: 'test'
      twine-repository-url:
        description: 'Twine --repository-url (upload API, e.g. Test PyPI or upload.pypi.org legacy)'
        required: true
        type: string
      artifact-name:
        description: 'Artifact name from the build job'
        required: true
        type: string
      python-version:
        description: 'Python version for setup-python'
        required: false
        type: string
        default: '3.11'
    secrets:
      pypi_username:
        description: 'PyPI username for twine upload'
        required: true
      pypi_password:
        description: 'PyPI password or API token for twine upload'
        required: true

jobs:
  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      # Overlay built wheels and build-time pyproject/Makefile (version matches build job).
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: 'Setup Python ${{ inputs.python-version }}'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: 'Make venv'
        run: make venv

      - name: 'Install twine'
        run: .venv/bin/pip install twine

      # Makefile upload-pypi reads TWINE_* (see Makefile).
      - name: 'Publish with twine (make upload-pypi)'
        env:
          TWINE_USERNAME: ${{ secrets.pypi_username }}
          TWINE_PASSWORD: ${{ secrets.pypi_password }}
          TWINE_REPOSITORY_URL: ${{ inputs.twine-repository-url }}
          TWINE_NON_INTERACTIVE: '1'
        run: make upload-pypi
